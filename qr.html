<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KS Investments — QR Code</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(145deg, #CAF0F8 0%, #DBF0FA 40%, #EDF6FF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: 28px;
      padding: 44px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 48px rgba(6, 182, 212, 0.15), 0 2px 8px rgba(0, 0, 0, 0.06);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #06B6D4, transparent);
    }

    .logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 16px;
      border: 1.5px solid rgba(6, 182, 212, 0.25);
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(6, 182, 212, 0.15);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0891B2;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 0.8rem;
      color: #64748B;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .qr-wrap {
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      display: inline-block;
      box-shadow: 0 4px 24px rgba(6, 182, 212, 0.15);
      border: 1px solid rgba(6, 182, 212, 0.12);
      margin-bottom: 20px;
    }

    #qr-canvas {
      display: block;
    }

    .url-label {
      font-size: 0.78rem;
      color: #64748B;
      background: rgba(6, 182, 212, 0.08);
      border: 1px solid rgba(6, 182, 212, 0.18);
      border-radius: 100px;
      padding: 6px 16px;
      display: inline-block;
      margin-bottom: 24px;
      word-break: break-all;
    }

    .hint {
      font-size: 0.82rem;
      color: #64748B;
      margin-bottom: 24px;
      line-height: 1.6;
    }



  </style>
</head>

<body>

  <div class="card">
    <img src="images/logo.png" alt="KS Investments" class="logo">
    <h1>KS Investments</h1>
    <p class="sub">by Anil Rathod</p>

    <div class="qr-wrap">
      <div id="qr-canvas"></div>
    </div>

    <br>
    <span class="url-label">https://ks-investments-landing.vercel.app/</span>

    <p class="hint">
      📱 Clients can scan this QR code to instantly open<br>the KS Investments app download page.
    </p>



  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    var qr = new QRCode(document.getElementById('qr-canvas'), {
      text: 'https://ks-investments-landing.vercel.app/',
      width: 280,
      height: 280,
      colorDark: '#0A0F1E',
      colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.H
    });


  </script>
</body>

</html>
